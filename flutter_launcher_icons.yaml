dev_dependencies:
  flutter_launcher_icons: "^0.14.3"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

  adaptive_icon_background: "#0571d3"       # Your brand background color
  adaptive_icon_foreground: "assets/icons/logo_foreground.png" # Your logo WITH transparency
  adaptive_icon_monochrome: "assets/icons/logo_monochrome.png" # For Android 13+ themed icons
